<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TYPE-16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Noto+Sans+JP:wght@100;300;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #d4ff3f;
            --sub-accent: #ff3f5e;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        .header-glass {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 255, 63, 0.1);
        }

        .question-card {
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .question-card.active { opacity: 1; filter: blur(0); }
        .question-card.inactive { opacity: 0.05; filter: blur(5px); pointer-events: none; }

        .dot {
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid;
            background: transparent;
        }
        .dot-agree { border-color: var(--accent); }
        .dot-agree.active { background: var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.05); }
        .dot-disagree { border-color: var(--sub-accent); }
        .dot-disagree.active { background: var(--sub-accent); box-shadow: 0 0 20px var(--sub-accent); transform: scale(1.05); }
        .dot-neutral { border-color: #475569; width: 20px; height: 20px; }
        .dot-neutral.active { background: #475569; transform: scale(1.05); }

        .progress-bar {
            height: 2px;
            background: rgba(212, 255, 63, 0.1);
            position: fixed;
            top: 0; left: 0; width: 100%; z-index: 100;
        }
        .progress-fill {
            height: 100%;
            background: #fff;
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .result-view { background-color: #ffffff !important; color: #000 !important; }
        .result-header-text { color: #000 !important; border-bottom-color: rgba(0,0,0,0.1) !important; }
        
        .stat-bar-container { 
            height: 10px; 
            background: #f0f0f0; 
            border-radius: 5px;
            position: relative; 
            width: 100%;
            overflow: hidden;
        }
        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 2;
        }
        .stat-bar-fill { 
            height: 100%; 
            position: absolute; 
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 1;
        }
        
        .bar-az { background: #5e17eb; }
        .bar-pq { background: #00d4ff; }
        .bar-lr { background: #ff3f5e; }
        .bar-i2 { background: #d4ff3f; }
        
        .heavy-name { font-weight: 900; font-size: 2.8rem; line-height: 1.1; letter-spacing: -0.05em; }
        @media (min-width: 768px) { .heavy-name { font-size: 4rem; } }
        
        /* --- 修正箇所: 画像サイズを0.8倍に --- */
        .pixel-art-wrapper {
            width: 256px;  /* 320 * 0.8 */
            height: 256px;
            max-width: 100%;
            margin: 0 auto 0 auto; /* 下マージンを0に */
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            position: relative;
        }
        @media (min-width: 768px) { 
            .pixel-art-wrapper { 
                width: 352px; /* 440 * 0.8 */
                height: 352px;
            } 
        }
        /* -------------------------------------- */
        
        .pixel-art-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 10;
        }

        .loading-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-pixel {
            width: 14px;
            height: 14px;
            background: #000;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(8px); } to { transform: translateY(-8px); } }

        .serif-display {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
        }

        /* テーブルデザイン */
        .rank-table-row {
            display: grid;
            grid-template-columns: 3rem 1fr 4rem;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }
        .rank-table-row:last-child { border-bottom: none; }
        .rank-table-header {
            background: #000;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.75rem 1rem;
            border-radius: 8px 8px 0 0;
        }
        .rank-me {
            background: #d4ff3f;
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(212, 255, 63, 0.3);
            border-radius: 4px;
            margin: -1px -4px;
            position: relative;
            z-index: 10;
            border: none;
        }
        
        .undo-text-btn {
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 0.1em;
            text-decoration: underline;
            margin-bottom: 2rem;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .undo-text-btn:hover { opacity: 1; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
    </div>

    <header id="main-header" class="header-glass fixed top-0 w-full py-4 px-8 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <!-- ヘッダーの戻るボタンは削除 -->
            <div class="font-bold tracking-tighter text-xl uppercase">Type16</div>
        </div>
        <div id="counter" class="text-[10px] font-bold opacity-40 font-mono">0 / 18</div>
    </header>

    <main class="max-w-4xl mx-auto px-6">
        <section id="welcome" class="min-h-screen flex flex-col items-center justify-center text-center">
            <h1 class="text-7xl md:text-9xl font-black mb-12 tracking-tighter uppercase">Type16</h1>
            <button onclick="start()" class="border border-lime-400 text-lime-400 px-12 py-4 rounded-full font-bold uppercase tracking-[0.3em] text-xs hover:bg-lime-400 hover:text-black transition-all">Start</button>
            
            <div class="mt-12 text-xs font-light opacity-60 space-y-2">
                <p>・理想の姿ではなく、ありのままを答えてください。</p>
                <p>・深く考えすぎず、直感で選んでください。</p>
                <p>・所要時間は約2分です。</p>
            </div>
        </section>

        <section id="quiz" class="hidden pb-80 pt-40"></section>
        <section id="result" class="hidden pt-20 pb-20"></section>
    </main>

    <script>
        // 固定画像の設定
        const STATIC_IMAGE_PATH = "https://kyoryu1039.github.io/kotoba-gacha/images/result.png";
        
        const RANKING_DATA = [
            { rank: 1, code: "APL-II", range: "11~14%" },
            { rank: 2, code: "ZPL-II", range: "9~14%" },
            { rank: 3, code: "APR-II", range: "9~13%" },
            { rank: 4, code: "ZPR-I", range: "8~12%" },
            { rank: 5, code: "AQL-II", range: "6~8%" },
            { rank: 6, code: "ZQL-I", range: "5~9%" },
            { rank: 7, code: "ZQL-II", range: "4~9%" },
            { rank: 8, code: "ZQR-I", range: "4~6%" },
            { rank: 9, code: "AQL-I", range: "4~5%" },
            { rank: 10, code: "ZQR-II", range: "4~5%" },
            { rank: 11, code: "AQR-I", range: "3~5%" },
            { rank: 12, code: "AQR-II", range: "2~5%" },
            { rank: 13, code: "APL-I", range: "2~5%" },
            { rank: 14, code: "APR-I", range: "2~5%" },
            { rank: 15, code: "ZPR-II", range: "2~4%" },
            { rank: 16, code: "ZPL-I", range: "1~3%" }
        ];

        const QUESTIONS = [
            "1. 犬よりも猫が好きだ", "2. 海よりも山が好きだ", "3. 中力粉よりも薄力粉が好きだ",
            "4. この頃涙もろくなったと思う", "5. 座右の銘なんてない", "6. 痛みには強い方だ",
            "7. もし急に尻尾が生えてきたら、友達に相談する前に医者に行くと思う", "8. 世の中を舐めている方だ",
            "9. かゆいくらいなら痛いほうがマシだと思ったことがある", "10. 歯磨きよりも耳かきのほうが好きだ",
            "11. 人に騙されるよりは人を騙して生きてきた", "12. カマキリを飼うなら名前はつけないと思う",
            "13. チェーン店よりも個人経営の店が好きだ", "14. 恐ろしい夢をよく見る",
            "15. コインを投げて表がでないと死ぬよと言われたら、ある程度は表を出せる自信がある", "16. うっすら嫌いな街がある",
            "17. バナナがもっと高い果物だったら、もう少しありがたがって食べていたと思う", "18. 名人と呼ばれるよりは達人と呼ばれたい"
        ];

        const AXIS_MAP = [
            { axis: 'AZ', sign: 1 }, { axis: 'PQ', sign: -1 }, { axis: 'LR', sign: 1 },
            { axis: 'I/II', sign: -1 }, { axis: 'AZ', sign: -1 }, { axis: 'PQ', sign: 1 },
            { axis: 'LR', sign: -1 }, { axis: 'I/II', sign: 1 }, { axis: 'AZ', sign: 1 },
            { axis: 'PQ', sign: -1 }, { axis: 'LR', sign: 1 }, { axis: 'I/II', sign: 1 },
            { axis: 'AZ', sign: -1 }, { axis: 'PQ', sign: -1 }, { axis: 'LR', sign: 1 }, { axis: 'I/II', sign: -1 },
            { axis: 'AZ', sign: 1 }, { axis: 'PQ', sign: -1 }
        ];

        const TYPES_DB = {
            "APL-I": { name: "当事者", en: "Protagonist" },
            "APL-II": { name: "従事者", en: "Practitioner" },
            "APR-I": { name: "担当者", en: "Assignee" },
            "APR-II": { name: "代行者", en: "Surrogate" },
            "AQL-I": { name: "滞在者", en: "Dweller" },
            "AQL-II": { name: "通過者", en: "Transient" },
            "AQR-I": { name: "待機者", en: "Standby" },
            "AQR-II": { name: "入力者", en: "Inputter" },
            "ZPL-I": { name: "関係者", en: "Associate" },
            "ZPL-II": { name: "同行者", en: "Companion" },
            "ZPR-I": { name: "保持者", en: "Possessor" },
            "ZPR-II": { name: "立会人", en: "Witness" },
            "ZQL-I": { name: "閲覧者", en: "Viewer" },
            "ZQL-II": { name: "目撃者", en: "Observer" },
            "ZQR-I": { name: "登録者", en: "Registrant" },
            "ZQR-II": { name: "申請者", en: "Applicant" }
        };

        const TEXTS_DB = {
            "APL-I": { phrase: "あなたは、出来事の中心に立たずにはいられない人です。", summary: "世界を「自らが干渉し、形作るべき素材」として捉えています。自らが干渉できない事象は存在しないも同然であり、あなたの万能感は、周囲を自らの手足として書き換えることでしか維持されません。", strength: "絶対的決断力 / 現実変革力", weak: "「自分がいないと何も始まらない」という強迫観念が静寂を奪います。自律的に動く他者を「反逆」と捉え、無意識に支配下に置こうとするため、真の対等な関係の構築が困難です。", dist: "他者を「協力者」か「障害」として峻別します。他者の主体性を無意識に剥奪し、自分の物語の背景へと追い込むことで、自らの実存を証明しようとします。", advice: "たまには「介入しないこと」が、最も高度な制御になる場合があることを知ってください。" },
            "APL-II": { phrase: "あなたは、決められた手順を実行することで世界と関わる人です。", summary: "人間が持つ「感情」という制御不能なバグを恐れ、ルールや技術に固執します。完璧な作業プロセスに自己を埋没させることで、傷つきやすい「生身の自分」を機能へと置換し、人間であることの不確実性から逃避しています。", strength: "驚異的な正確性 / 静かなる自律", weak: "予期せぬエラーは「世界の崩壊」として精神を直撃します。マニュアル外の事態に直面した際、解決策を探す前に、その不条理な現実に激しい殺意や絶望を抱きます。", dist: "深入りを避け、役割に基づいた適度な距離を保ちます。不完全な人間性よりも、そこに介在する「確実性」を愛しており、職分を全うできる相手にのみ敬意を払います。", advice: "不完全な「遊び」や「余白」の中にこそ、次のレベルへ進化するためのヒントが隠されています。" },
            "APR-I": { phrase: "あなたは、状況に役割を割り当てることで安心する人です。", summary: "他者を配置し管理することに執着するのは、そうしなければ自分自身の所在が分からなくなるからです。他人の行動を予測可能な範囲に閉じ込めることで、世界から「驚威（恐怖）」を排除しようとしています。", strength: "構造的思考 / 状況の安定化", weak: "論理的整合性を盾に他者を断罪しますが、それは内面にある「弱さへの嫌悪」の裏返しです。管理できない「野生の感情」をぶつけられると、途端に脆弱な子供のように思考停止に陥ります。", dist: "誰に対しても公平かつ礼儀正しいですが、それは管理を容易にするためのポーズです。本心は、選ばれた人間にしか触れさせない厳格な門を持っています。", advice: "論理では説明できない「情念」を計算に含めることが、真の統率への近道となります。" },
            "APR-II": { phrase: "あなたは、自分の意思よりも場の要請を優先する人です。", summary: "驚異的な適応力は、純粋な「拒絶への恐怖」から生じています。自分という実体を持てば誰かと衝突し、排除されるリスクがある。そのため、相手が望む虚像を差し出し続けることで生存を許される「鏡」となります。", strength: "超適応能力 / 摩擦の解消", weak: "独りになった瞬間に「自分は何者でもない」という強烈な虚無感に襲われます。他者の期待を裏切ることを死よりも恐れるため、搾取されている状況にさえ依存してしまいます。", dist: "相手に合わせて距離感を変幻自在に変えますが、本人は誰に対しても深入りしていないという、奇妙な孤独感を抱えています。", advice: "「誰の役にも立っていない時の自分」にこそ、真の価値があることを認めてください。" },
            "AQL-I": { phrase: "あなたは、簡単には動かず、内側に留まり続ける人です。", summary: "外部世界を「不純で、理解に値しないもの」と切り捨て、自らの中に築き上げた完璧な価値体系だけを真実とします。あなたの探究は、未知を求めているのではなく、既知の自説を絶対化するためにあります。", strength: "驚異的な持続力 / 一貫した自己同一性", weak: "自身の聖域を侵す者に対し、対話ではなく「抹殺（完全な無視）」を選択します。独善的な正しさに安住するあまり、現実世界での適応能力が退化し、社会的な孤立を自ら加速させます。", dist: "表面的な交流を排し、魂の深い部分で共鳴できる「極少数の理解者」のみを求めます。それ以外に対しては、徹底した無関心を貫きます。", advice: "境界線の外側にある「無意味な変化」に触れることで、あなたの聖域はより強固なものになります。" },
            "AQL-II": { phrase: "あなたは、一つの場所に意味を固定しない人です。", summary: "移動を続けるのは、自由を求めているからではありません。一つの場所に留まり、正体が露呈し、責任を負わされることを恐れているからです。関係性が深まる前に自ら壊すことで、振られる側の屈辱を回避しようとします。", strength: "高い俯瞰能力 / 執着からの解放", weak: "深まりを回避するため、何を手に入れても「自分のもの」になった感覚が得られない空虚感を抱えます。困難に直面すると、解決よりも「立ち去ること」を選び、蓄積のない人生を送り続けます。", dist: "風通しの良い関係を好みますが、定義されることを察知すると、音もなく距離を置きます。常に「出口」を確保していなければ呼吸ができません。", advice: "一度だけ「逃げられない責任」を背負ってみてください。それがあなたの真の自由を証明します。" },
            "AQR-I": { phrase: "あなたは、動く前に空気が変わるのを待つ人です。", summary: "沈黙を守るのは、調和を愛しているからではなく、自分の言葉が場を乱し、自分に牙が向くのを防ぐためです。他者の意志に身を委ねることで、決断に伴う全責任から逃避している「消極的な支配」の状態にあります。", strength: "卓越した受容性 / 忍耐強いタイミング把握", weak: "内面には表に出せない膨大な毒素（不満）を溜め込んでいます。それが限界に達したとき、説明抜きにすべてを遮断し、周囲を当惑させることで、静かな復讐を果たします。", dist: "常に寄り添う形をとりますが、そこにはあなた自身の体温はありません。他者の感情を鏡のように反射するだけで、自分からは決して踏み込みません。", advice: "あなたの沈黙は、時に他者への「無言の強制」になります。時には不完全な言葉で介入を。" },
            "AQR-II": { phrase: "あなたは、外から入ってくるものによって自分を形づくる人です。", summary: "あなたには自分と他人を分かつフィルターが存在しません。あらゆる情報を自分のこととして取り込むのは、自律的な自己が不在であり、外部からの刺激によってしか自分を定義できないことの裏返しです。", strength: "多層的な共感能力 / 膨大な情報ネットワーク", weak: "感情のオーバーロードにより、定期的かつ突発的に精神が崩壊します。他人の不幸を自分の罪のように感じて絶望しますが、それは単なる自己陶酔的な同情に過ぎないこともあります。", dist: "境界線が曖昧で、他人の問題を自分のこととして抱え込みすぎます。共感力の高さは、自己を他者の声で溢れかえらせることで空虚を埋める行為でもあります。", advice: "情報を取り込むだけでなく、あなた自身の核から生まれる「出力」を意識的に強化してください。" },
            "ZPL-I": { phrase: "あなたは、個人よりも構造との距離で物事を判断する人です。", summary: "客観性を重視するのは、主観がもたらす「痛み」に耐えられないからです。事象を数値や法則に置き換えることで、生々しい現実から解毒しようとしています。無機質な構造の中にいる時だけが、最も安全だと感じています。", strength: "鉄の客観性 / 構造的メンテナンス力", weak: "他者の感情を「非論理的」と切り捨てますが、実はあなた自身が最も感情の取り扱いを知らない「未発達児」です。予期せぬ親愛を向けられると、バグを起こした機械のように拒絶反応を示します。", dist: "利害関係や役割に基づいた、効率的な交流を好みます。あなたが組織を支えるのは忠誠心からではなく、システムの論理性に従うことが自己保存に直結するからです。", advice: "「効率の悪い感情」の中にこそ、システムを駆動させる本当のエネルギーがあることを認めてください。" },
            "ZPL-II": { phrase: "あなたは、誰かの隣にいることで力を発揮する人です。", summary: "単独では輝くことができず、誰かの影に隠れることでしか安寧を得られません。献身は相手のためではなく、その相手がいなくなった時に自分が無価値になることへの恐怖から生じています。「支える」という名目で相手の人生を侵食します。", strength: "高い献身性 / リズムの同期", weak: "依存先が弱さを見せた瞬間、冷酷に失望し、次の「強い光」を探し始めます。あなたの忠誠心は、相手の人間性ではなく、「強さ」という機能に対してのみ向けられています。", dist: "一歩引いた位置から見守りますが、それは依存先を逃さないための監視でもあります。不可欠な存在になろうと画策することで、自らのアイデンティティを確立しようとします。", advice: "時には相手を追い越し、あなた自身の行き先を提示することが、真の支援になることもあります。" },
            "ZPR-I": { phrase: "あなたは、変えないことに価値を置く人です。", summary: "新しいものはすべて「正しくないもの」です。伝統を守るのは、変化を「死」と同義と捉えているからです。既知のルールを反復することで、世界が止まっているという幻想を維持し、自身の老いや衰退という現実から目を背けています。", strength: "圧倒的誠実さ / 細部への執着", weak: "自分の正しさを証明するために、他者の進化や成長を「逸脱」として非難します。あなたが守っているのはもはや中身のない殻であり、形骸化した正義で他者を縛り付けることに執着します。", dist: "同じ価値観を共有する「身内」を極めて大切にしますが、外来者に対しては強い警戒心を抱きます。変化を促す者を「秩序を乱す敵」として冷遇します。", advice: "伝統とは「灰を守ること」ではなく「火を繋ぐこと」です。形を変える勇気を持ってください。" },
            "ZPR-II": { phrase: "あなたは、起きたことを起きたままに見る人です。", summary: "事実に固執するのは、そこに「意味」や「希望」を見出すことを諦めているからです。起きたことをただ記すことで、物事の背後にあるドラマや痛みを無効化し、すべてを「終わった事実」として処理しようとする、終わりの証明者です。", strength: "揺るぎない公平性 / 事実への忠実さ", weak: "絶望的な状況において、助けを出す代わりに「状況の正確な記録」を優先します。その冷徹さは、苦しんでいる当事者にとって、暴力よりも深い絶望を与える心理的な加害性となります。", dist: "利害関係から一線を引いた、中立的でドライな位置に身を置きます。事実を優先するあまり、個人の切実な感情を「正しくないもの」として切り捨て、残酷な結論を出すことがあります。", advice: "「事実」の背後にある「真実（理由）」に目を向けることで、あなたの言葉はより重みを増します。" },
            "ZQL-I": { phrase: "あなたは、世界に直接触れずに理解しようとする人です。", summary: "分析や批評を行うことで、あたかも世界を支配しているかのような錯覚に浸り、自分が挑戦して失敗するリスクから逃げ続けています。", strength: "圧倒的な分析眼 / 感情の非干渉", weak: "自分の人生さえも「他人事」のように眺めてしまい、実感を伴わない空虚感に苛まれます。他者の失敗を嘲笑うことで優越感を維持しますが、何に対しても本気になれず生涯を終えるリスクがあります。", dist: "交流を楽しみますが、魂の核は決して見せません。相手が踏み込もうとすると、高説を垂れるか、皮肉を言うことで巧妙に回避し、安全圏へと引きこもります。", advice: "一度くらい、大怪火を覚悟で舞台の上に飛び降りてください。そこから本当の人生が始まります。" },
            "ZQL-II": { phrase: "あなたは、一瞬の出来事に意味を見出す人です。", summary: "世界に意味を見出すとき、それは常に「自分にとって心地よい物語」に変換されています。他者の本物の苦悩さえも、感性を刺激する「素材」として消費します。共感は相手を救うためではなく、自分の内面世界を彩るためにあります。", strength: "豊かな感性と表現力 / 真実の抽出", weak: "現実の汚さに耐性がありません。理想化した相手が人間らしい欠点を見せた瞬間、あなたは「裏切られた」と感じ、その存在その物語から冷酷に抹殺します。", dist: "相手の深い部分を覗き込もうとしますが、自分自身は謎に包まれています。理解者ではなく「共鳴者」を求めますが、相手の実像ではなく、自分が投影した理想を愛しています。", advice: "物語を語るだけでなく、あなた自身がその物語の「結末」に責任を持つ覚悟を持ってください。" },
            "ZQR-I": { phrase: "あなたは、枠組みに属することで自分を定義する人です。", summary: "個としての意志を持つことに死の恐怖に近い不安を感じるため、集団のルールに同化します。罪悪感を薄め、大きな流れに身を任せる快楽に溺れている「平庸な共犯者」の状態です。", strength: "高い協調性と安定感 / 帰属性の強化", weak: "集団が狂気に走ったとき、あなたは最も残酷な加害者になります。自分の意志がないため、命令や空気に従っているという自覚すらなく、平気で他者を踏みにじることができるようになります。", dist: "「同じ側にいるかどうか」を重視します。所属を同じくする相手には極めて献身的ですが、外側の人間や、枠組みを批判する者には一切の慈悲を見せず冷淡に排除します。", advice: "あなたが所属している「枠」そのものが、時代遅れになっていないかを定期的に疑ってください。" },
            "ZQR-II": { phrase: "あなたは、まだ許可を待っている人です。", summary: "自分で自分を認める勇気がありません。常に「上位者」に合格点をもらうことを求め、一生を「準備期間」として浪費します。新しい学びを渡り歩くのは、成長ではなく「厳しい現実」からの逃避です。", strength: "素直な受容性と学習力 / 変化への渇望", weak: "師や環境を次々と変えますが、それはあなたが成長したからではなく、単に自分の無能さを突きつけられる前に「もっといい場所」へ夢を見に逃げ込んでいるだけです。", dist: "自分を引き上げてくれる先駆者を熱狂的に求め、付き従います。しかし、現実的な責任を求められると、新たな「光」を求めて音もなく去っていきます。", advice: "門を叩くのをやめ、今いる場所で「自分の城」を建てるための石を一つ、置いてみてください。" }
        };

        let currentAnswers = new Array(QUESTIONS.length).fill(null);
        let currentIndex = 0;

        function start() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('quiz');
            container.innerHTML = '';
            QUESTIONS.forEach((q, i) => {
                const card = document.createElement('div');
                card.id = `q-${i}`;
                card.className = `question-card py-32 text-center ${i === 0 ? 'active' : 'inactive'}`;
                // Undoボタンを質問文の下に追加
                const undoBtn = i > 0 ? `<div onclick="goBack()" class="undo-text-btn">← Undo</div>` : '';
                
                card.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold mb-4 px-4 leading-relaxed">${q}</h2>
                    ${undoBtn}
                    <div class="flex items-center justify-center gap-4 md:gap-8 mb-6 mt-8">
                        <button onclick="ans(${i}, 1)" class="dot dot-agree w-12 h-12"></button>
                        <button onclick="ans(${i}, 2)" class="dot dot-agree w-9 h-9"></button>
                        <button onclick="ans(${i}, 3)" class="dot dot-agree w-6 h-6"></button>
                        <button onclick="ans(${i}, 4)" class="dot dot-neutral"></button>
                        <button onclick="ans(${i}, 5)" class="dot dot-disagree w-6 h-6"></button>
                        <button onclick="ans(${i}, 6)" class="dot dot-disagree w-9 h-9"></button>
                        <button onclick="ans(${i}, 7)" class="dot dot-disagree w-12 h-12"></button>
                    </div>
                    <div class="flex justify-between max-w-[280px] mx-auto text-[10px] font-bold tracking-widest uppercase opacity-30">
                        <span class="text-lime-400">そう思う</span>
                        <span class="text-rose-500">そう思わない</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function ans(idx, val) {
            currentAnswers[idx] = val;
            const dots = document.querySelectorAll(`#q-${idx} .dot`);
            dots.forEach(d => d.classList.remove('active'));
            dots[val - 1].classList.add('active');
            
            const done = currentAnswers.filter(a => a !== null).length;
            document.getElementById('progress-fill').style.width = (done / QUESTIONS.length * 100) + '%';
            document.getElementById('counter').innerText = `${done} / ${QUESTIONS.length}`;

            currentIndex = idx;

            if (idx < QUESTIONS.length - 1) {
                setTimeout(() => {
                    document.getElementById(`q-${idx}`).classList.replace('active', 'inactive');
                    const next = document.getElementById(`q-${idx + 1}`);
                    next.classList.remove('inactive');
                    next.classList.add('active');
                    next.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 400);
            } else {
                setTimeout(finish, 600);
            }
        }

        function goBack() {
            if (currentIndex > 0) {
                document.getElementById(`q-${currentIndex}`).classList.replace('active', 'inactive');
                currentIndex--;
                const prev = document.getElementById(`q-${currentIndex}`);
                prev.classList.remove('inactive');
                prev.classList.add('active');
                prev.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function pushToEdges(percent) {
            const x = percent / 100;
            const k = 0.9; 
            let y = 1 / (1 + Math.exp(-k * (x - 0.5) * 10));
            const minBound = 1 / (1 + Math.exp(-k * (-0.5) * 10));
            const maxBound = 1 / (1 + Math.exp(-k * (0.5) * 10));
            y = (y - minBound) / (maxBound - minBound);
            return Math.round(y * 100);
        }

        function finish() {
            let scores = { AZ: 0, PQ: 0, LR: 0, "I/II": 0 };
            let counts = { AZ: 0, PQ: 0, LR: 0, "I/II": 0 };

            currentAnswers.forEach((v, i) => {
                const m = AXIS_MAP[i];
                if (v !== null) {
                    const weight = (4 - v); 
                    scores[m.axis] += weight * m.sign;
                    counts[m.axis]++;
                }
            });

            document.getElementById('quiz').classList.add('hidden');
            const res = document.getElementById('result');
            res.classList.remove('hidden');
            res.innerHTML = `<div class="min-h-[60vh] flex flex-col items-center justify-center">
                <div class="loading-pixel mb-8"></div>
                <p class="font-mono text-[10px] opacity-40 uppercase tracking-widest">Assessing Specimen...</p>
            </div>`;

            const calcPercent = (axis) => {
                const maxScore = counts[axis] * 3;
                if (maxScore === 0) return 50; 
                const rawP = ((scores[axis] + maxScore) / (maxScore * 2)) * 100;
                return pushToEdges(rawP);
            };

            const az_p = calcPercent('AZ');
            const pq_p = calcPercent('PQ');
            const lr_p = calcPercent('LR');
            const i2_p = calcPercent('I/II');

            const code = `${az_p >= 50 ? 'A' : 'Z'}${pq_p >= 50 ? 'P' : 'Q'}${lr_p >= 50 ? 'L' : 'R'}-${i2_p >= 50 ? 'I' : 'II'}`;
            const data = TYPES_DB[code];
            const textData = TEXTS_DB[code];

            setTimeout(() => {
                showResult(data.name, data.en, textData, code, { az_p, pq_p, lr_p, i2_p }, STATIC_IMAGE_PATH);
            }, 1500);
        }

        function copyToClipboard(text, btn) {
            const originalText = btn.innerText;
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            document.body.removeChild(textarea);
        }

        function showResult(typeName, enName, data, code, stats, img) {
            document.body.classList.add('result-view');
            const header = document.getElementById('main-header');
            header.classList.add('result-header-text');
            header.style.backgroundColor = 'transparent';

            const shareText = `【Type16】診断結果：${typeName} (${code})\n#Type16 #自己分析\n${window.location.href}`;
            
            const myRankData = RANKING_DATA.find(r => r.code === code);
            const myRange = myRankData ? myRankData.range : "---";
            const myRank = myRankData ? myRankData.rank : "-";

            const rankingTableHTML = `
                <div class="border border-black border-opacity-10 rounded-lg overflow-hidden bg-white shadow-sm">
                    <div class="rank-table-header">Type16割合ランキング</div>
                    <div>
                        ${RANKING_DATA.map(r => {
                            const isMe = r.code === code;
                            const typeInfo = TYPES_DB[r.code];
                            return `
                                <div class="rank-table-row ${isMe ? 'rank-me' : 'opacity-60'}">
                                    <div class="font-mono font-bold text-center">${r.rank}</div>
                                    <div class="flex flex-col md:flex-row md:gap-4 leading-tight">
                                        <span class="font-mono font-bold ${isMe ? '' : 'text-xs md:text-sm'}">${r.code}</span>
                                        <span class="text-[10px] md:text-xs tracking-tighter">${typeInfo.name}</span>
                                    </div>
                                    <div class="font-mono text-right font-bold">${r.range}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            const res = document.getElementById('result');
            
            res.innerHTML = `
                <div class="space-y-16">
                    <div class="flex flex-col items-center justify-center text-center">
                        <div class="pixel-art-wrapper mb-0">
                            <img src="${img}" alt="Result Character">
                        </div>
                        <p class="text-2xl md:text-4xl font-bold opacity-50 tracking-[0.2em] font-mono leading-none mb-2 mt-0">${code}</p>
                        <h2 class="heavy-name mb-0">${typeName}</h2>
                        <p class="text-[10px] font-bold tracking-[0.4em] opacity-40 uppercase font-mono mb-4">${enName}</p>
                        <div class="max-w-md mx-auto px-4">
                           <h3 class="serif-display text-xl md:text-2xl leading-tight mb-2">「${data.phrase}」</h3>
                           <p class="text-sm opacity-60 leading-relaxed font-light">${data.summary}</p>
                        </div>
                    </div>

                    <div class="space-y-12">
                        <div class="text-center">
                             <span class="text-[9px] font-bold tracking-[0.2em] opacity-30 uppercase block mb-2">Type16割合ランキング</span>
                             <div class="inline-block bg-gray-100 rounded-md px-6 py-3">
                                 <p class="font-mono text-xs md:text-sm font-bold tracking-tight">世界：${myRange}（${myRank}／16位）　日本：（計測中）</p>
                             </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start py-6 border-t border-black border-opacity-10">
                             <div class="space-y-6">
                                ${renderStat("A", "Z", stats.az_p, "bar-az")}
                                ${renderStat("P", "Q", stats.pq_p, "bar-pq")}
                            </div>
                            <div class="space-y-6">
                                ${renderStat("L", "R", stats.lr_p, "bar-lr")}
                                ${renderStat("I", "II", stats.i2_p, "bar-i2")}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="border-t border-black pt-6">
                                <span class="text-[8px] font-bold tracking-[0.4em] opacity-30 block mb-3 uppercase">Specialty / 得意領域</span>
                                <p class="text-lg font-bold">${data.strength}</p>
                            </div>
                            <div class="border-t border-black pt-6">
                                <span class="text-[8px] font-bold tracking-[0.4em] opacity-30 block mb-3 uppercase">Structural Flaw / 構造的欠陥</span>
                                <p class="text-sm opacity-60 leading-relaxed italic">${data.weak}</p>
                            </div>
                        </div>

                        <div class="border-t border-black pt-6">
                            <span class="text-[8px] font-bold tracking-[0.4em] opacity-30 block mb-3 uppercase">Distance From Others / 他者との距離</span>
                            <p class="text-sm opacity-60 leading-relaxed">${data.dist}</p>
                        </div>

                        <div class="bg-[#f3f4f6] text-black p-10 md:p-14 rounded-[20px] text-center shadow-sm">
                            <span class="text-[8px] font-bold tracking-[0.5em] opacity-50 block mb-6 uppercase">Observation Message / 観測所見</span>
                            <p class="serif-display text-xl md:text-2xl leading-snug">「${data.advice}」</p>
                        </div>

                        <div class="pt-8 px-2 md:px-0">
                            ${rankingTableHTML}
                        </div>

                        <div class="flex flex-col items-center gap-6 pt-4">
                            <button onclick='copyToClipboard(\`${shareText}\`, this)' class="border border-black px-12 py-3 rounded-full font-bold uppercase tracking-[0.3em] text-[10px] hover:bg-black hover:text-white transition-all">Share Results (Copy)</button>
                            <button onclick="location.reload()" class="text-[10px] font-bold tracking-[0.3em] opacity-30 hover:opacity-100 transition-opacity uppercase underline">Restart Dissection</button>
                        </div>
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderStat(leftLabel, rightLabel, percent, colorClass) {
            let leftOffset = 50;
            let width = 0;
            
            if (percent >= 50) {
                width = percent - 50;
                leftOffset = 50 - width;
            } else {
                width = 50 - percent;
                leftOffset = 50;
            }

            return `
                <div class="space-y-2">
                    <div class="flex justify-between items-end font-mono text-[9px] uppercase">
                        <span class="font-bold ${percent >= 50 ? 'opacity-100' : 'opacity-20'}">${leftLabel}</span>
                        <span class="font-bold opacity-30 text-[8px] tracking-widest">${percent}% / ${100-percent}%</span>
                        <span class="font-bold ${percent < 50 ? 'opacity-100' : 'opacity-20'}">${rightLabel}</span>
                    </div>
                    <div class="stat-bar-container">
                        <div class="center-line"></div>
                        <div class="stat-bar-fill ${colorClass}" style="left: ${leftOffset}%; width: ${width}%;"></div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
